# Used by the GitHub mirror to publish images for all services in the docker-compose.yml
#   https://github.com/montehurd?tab=packages&repo_name=mediawiki-docker-images
# Usage:
#   FROM ghcr.io/montehurd/mediawiki-docker-images/#SERVICE_NAME#:latest

name: Build Docker images for docker-compose.yml services

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up matrix
        id: set-matrix
        run: |
          all_services=$(yq -r '.services | keys[]' docker-compose.yml)

          # Find which top-level folders changed in this push
          changed_dirs=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | cut -d/ -f1 | sort -u)
          echo "Changed dirs: $changed_dirs"

          # Only build services whose folder changed; if none matched,
          # a non-service path changed so build everything.
          services=""
          for svc in $all_services; do
            if echo "$changed_dirs" | grep -qx "$svc"; then
              services="$services $svc"
            fi
          done
          if [ -z "$services" ]; then
            services="$all_services"
          fi

          matrix_json=$(echo "$services" | xargs -n1 | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix={\"service\":$matrix_json}" >> $GITHUB_OUTPUT
          echo "Services to build: $matrix_json"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push ${{ matrix.service }}
        env:
          REGISTRY: ghcr.io/${{ github.repository }}/
        run: |
          echo "Building ${{ matrix.service }}..."
          docker compose build ${{ matrix.service }}
          docker compose push ${{ matrix.service }}
